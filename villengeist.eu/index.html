<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Villengeist</title>
    <!-- Verbindung zur style.css im selben Ordner -->
    <link rel="stylesheet" href="style.css">
    
    <!-- Google Fonts Links repariert -->
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com/css2?family=Montserrat:wght@200;300;400&display=swap" rel="stylesheet">
</head>
<body>

    <div class="login-container">
        <!-- Foto mit der richtigen Endung .jpeg -->
        <div class="image-wrapper">
            <img src="bilder/login-foto.jpeg" alt="Villengeist Vorschau" class="login-image">
        </div>

        <h1>Villengeist</h1>
        <div class="divider"></div>
        <p class="subtitle">Bitte gib das Passwort ein, um fortzufahren.</p>

        <!-- AB HIER ERSETZEN -->
        <form id="loginForm">
            <!-- Typ auf 'text' geändert und Abstand nach unten (margin-bottom) hinzugefügt -->
            <input type="text" id="passwordInput" placeholder="Passwort eingeben" required autocomplete="off" style="margin-bottom: 15px;">
            <button type="submit">Eintreten</button>
        </form>
        <!-- BIS HIER ERSETZEN -->
        
        <p id="errorMessage" class="error-text"></p>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const passwortEingabe = document.getElementById('passwordInput').value;
            const richtigesPasswort = "lindenholz-macht-stube-warm"; 

            if (passwortEingabe === richtigesPasswort) {
                window.location.href = "hauptseite.html"; 
            } else {
                const error = document.getElementById('errorMessage');
                error.textContent = "Falsches Passwort. Bitte versuche es erneut.";
                error.style.display = "block";
            }
        });
    </script>

</body>
</html>
