<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Startseite - Villengeist</title>
    <link rel="stylesheet" href="style.css">
    
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com" rel="stylesheet">

    <!-- Supabase-Bibliothek -->
    <script src="https://jsdelivr.net"></script>

    <style>
        .calendar-wrapper { margin-top: 30px; font-family: 'Montserrat', sans-serif; }
        .calendar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .calendar-header h3 { margin: 0; font-weight: 300; font-size: 1.2rem; letter-spacing: 1px; }
        .calendar-btn { background: none; border: 1px solid #ccc; padding: 5px 12px; cursor: pointer; font-family: inherit; font-size: 1rem; transition: all 0.2s; }
        .calendar-btn:hover { background-color: #f5f5f5; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; text-align: center; }
        .weekday { font-weight: 400; font-size: 0.8rem; color: #888; padding-bottom: 5px; border-bottom: 1px solid #eee; }
        .day { padding: 10px 0; font-size: 0.9rem; font-weight: 200; cursor: pointer; border-radius: 2px; transition: all 0.2s; }
        .day:hover { background-color: #f9f9f9; }
        .empty-day { visibility: hidden; }
        .booked-day { border-bottom: 2px solid #c5a880; font-weight: 300; }
        .selected-day { background-color: #1a2a3a !important; color: white !important; }
        .booking-box { margin-top: 25px; padding-top: 20px; border-top: 1px solid #eee; font-family: 'Montserrat', sans-serif; text-align: left; }
        .booking-box h4 { margin: 0 0 15px 0; font-weight: 300; font-size: 1rem; letter-spacing: 1px; color: #333; }
        .booking-fields { display: flex; gap: 10px; flex-wrap: wrap; }
        .booking-fields select, .booking-fields button { padding: 8px 12px; border: 1px solid #ccc; background: white; font-family: inherit; font-size: 0.85rem; font-weight: 300; outline: none; border-radius: 2px; }
        .booking-fields button { background: #1a2a3a; color: white; border: 1px solid #1a2a3a; cursor: pointer; transition: all 0.2s; }
        .booking-fields button:hover { background: #c5a880; border-color: #c5a880; }
        .info-text { font-size: 0.8rem; color: #888; margin-top: 8px; font-style: italic; }
    </style>
</head>
<body>

    <div class="login-container" style="max-width: 600px; margin: 0 auto; padding: 20px;">
        <div class="image-wrapper">
            <img src="bilder/hauptseite-foto.jpeg" alt="Villengeist Hauptseite" class="login-image">
        </div>

        <h1>Villengeist</h1>
        <div class="divider"></div>
        <p class="subtitle">Willkommen im geschützten Bereich – das Passwort war korrekt.</p>

        <div class="calendar-wrapper">
            <div class="calendar-header">
                <button class="calendar-btn" id="prevMonth">&larr;</button>
                <h3 id="monthYearDisplay">Monat Jahr</h3>
                <button class="calendar-btn" id="nextMonth">&rarr;</button>
            </div>
            <div class="calendar-grid" id="calendarGrid"></div>
        </div>

        <div class="booking-box">
            <h4 id="selectionTitle">Wähle einen Tag im Kalender</h4>
            <form id="directBookingForm" class="booking-fields" style="display: none;">
                <select id="userSelect" required>
                    <option value="" disabled selected>Wer bist du?</option>
                    <option value="Hase">Hase</option>
                    <option value="Fuchs">Fuchs</option>
                    <option value="Schnecke">Schnecke</option>
                    <option value="Simba">Simba</option>
                    <option value="Glitzer">Glitzer</option>
                    <option value="Marie">Marie</option>
                    <option value="Lausbub">Lausbub</option>
                    <option value="Trommler">Trommler</option>
                    <option value="Veilchen">Veilchen</option>
                    <option value="Rosa">Rosa</option>
                </select>

                <select id="roomSelect" required>
                    <option value="" disabled selected>Welcher Raum?</option>
                    <option value="Raum 1">Raum 1</option>
                    <option value="Room 2">Raum 2</option>
                </select>

                <button type="submit">Reservieren</button>
            </form>
            <div id="dayInfoText" class="info-text"></div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://supabase.co";
        const SUPABASE_ANON_KEY = "sb_publishable_Y_Iz-ukUr-3JFCwO9U9CZQ_EvcwWbUO";
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let currentDate = new Date();
        let gebuchteTermine = [];
        let gewaehltesDatumStr = ""; 

        const monthNames = ["Januar", "Februar", "März", "April", "Mai", "Juni", "Juli", "August", "September", "Oktober", "November", "Dezember"];
        const weekDays = ["Mo", "Di", "Mi", "Do", "Fr", "Sa", "So"];

        // Event Listener für die Monats-Buttons
        document.getElementById('prevMonth').addEventListener('click', () => {
            currentDate.setMonth(currentDate.getMonth() - 1);
            renderCalendar();
        });
        document.getElementById('nextMonth').addEventListener('click', () => {
            currentDate.setMonth(currentDate.getMonth() + 1);
            renderCalendar();
        });

        async function ladeCloudDaten() {
            try {
                const { data, error } = await supabase.from('posts').select('*');
                if (!error) {
                    gebuchteTermine = data || [];
                } else {
                    console.error("Supabase Fehler:", error);
                }
            } catch (err) {
                console.error("Verbindungsfehler:", err);
            }
            renderCalendar();
        }

        function renderCalendar() {
            const grid = document.getElementById('calendarGrid');
            const display = document.getElementById('monthYearDisplay');
            if (!grid || !display) return;
            
            grid.innerHTML = ''; 
            
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            display.textContent = `${monthNames[month]} ${year}`;
            
            weekDays.forEach(day => {
                const dayHeader = document.createElement('div');
                dayHeader.className = 'weekday';
                dayHeader.textContent = day;
                grid.appendChild(dayHeader);
            });
            
            const firstDayOfMonth = new Date(year, month, 1);
            let startDay = firstDayOfMonth.getDay(); 
            startDay = startDay === 0 ? 6 : startDay - 1;
            
            const totalDays = new Date(year, month + 1, 0).getDate();
            
            for (let i = 0; i < startDay; i++) {
                const emptyCell = document.createElement('div');
                emptyCell.className = 'empty-day';
                grid.appendChild(emptyCell);
            }
            
            for (let day = 1; day <= totalDays; day++) {
                const dayCell = document.createElement('div');
                dayCell.className = 'day';
                dayCell.textContent = day;

                const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                const treffer = gebuchteTermine.filter(t => t.start_date && t.start_date.substring(0, 10) === dateStr);
                
                if (treffer.length > 0) { dayCell.classList.add('booked-day'); }
                if (dateStr === gewaehltesDatumStr) { dayCell.classList.add('selected-day'); }

                dayCell.addEventListener('click', () => {
                    document.querySelectorAll('.day').forEach(d => d.classList.remove('selected-day'));
                    dayCell.classList.add('selected-day');
                    gewaehltesDatumStr = dateStr;
                    
                    document.getElementById('selectionTitle').textContent = `Buchung für den ${day}. ${monthNames[month]}:`;
                    document.getElementById('directBookingForm').style.display = 'flex';
                    
                    if (treffer.length > 0) {
                        const belegungen = treffer.map(t => `${t.room || 'Raum'} (${t.user_name || 'Unbekannt'})`).join(', ');
                        document.getElementById('dayInfoText').textContent = `Bereits belegt: ${belegungen}`;
                    } else {
                        document.getElementById('dayInfoText').textContent = "Für diesen Tag liegen keine Buchungen vor.";
                    }
                });

                grid.appendChild(dayCell);
            }
        }

        document.getElementById('directBookingForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const user = document.getElementById('userSelect').value;
            const room = document.getElementById('roomSelect').value;

            if (!gewaehltesDatumStr) return;

            const { data, error } = await supabase.from('posts').insert([
                { start_date: gewaehltesDatumStr, user_name: user, room: room }
            ]);

            if (!error) {
                alert("Erfolgreich reserviert!");
                ladeCloudDaten(); 
            } else {
                alert("Fehler bei der Reservierung: " + error.message);
            }
        });

        ladeCloudDaten();
    </script>
